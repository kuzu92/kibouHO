# ==========================================
# 割り当てモードの設定
# ==========================================
# satisfaction_first : 第1希望最優先モード（これまでの挙動。上位希望者を最大化）
# fairness_first     : ワースト回避モード（第3・第4希望などの下位当選者を最小化）
mode: fairness_first

# 1. 各役職の定員（合計人数が参加者数と一致するようにしてください）
roles:
  HO1: 1
  HO2: 1
  HO3: 1
  HO4: 1

# 2. メンバーの希望順位（数値が同じものは同率順位として扱われます）
preferences:
  Member1:
    HO1: 2
    HO2: 2
    HO3: 1
    HO4: 1
  Member2:
    HO1: 1
    HO2: 3
    HO3: 3
    HO4: 2
  Member3:
    HO1: 2
    HO2: 1
    HO3: 3
    HO4: 1
  Member4:
    HO1: 2
    HO2: 1
    HO3: 1
    HO4: 3
