name: Execute Role Assignment

# ブラウザから手動で実行できるようにする設定
on:
  workflow_dispatch:

jobs:
  assign:
    runs-on: ubuntu-latest

    steps:
    # 1. リポジトリのコードをサーバーに持ってくる
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. サーバーにPythonをセットアップする
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 必要なライブラリ(PyYAML)をインストールする
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml

    # 4. メインプログラムを実行し、結果をファイルに保存する
    - name: Run assignment script
      run: |
        python assign.py > result.txt
        cat result.txt # ログ画面にも結果を表示する

    # 5. 結果のテキストファイルをダウンロードできるように保存する
    - name: Upload result artifact
      uses: actions/upload-artifact@v4
      with:
        name: assignment-result
        path: result.txt
